trigger: none
pool:
  name: ModuleAgent
stages:
- stage: terraformrunning
  jobs:
  - job: 
    displayName: Terraforminstall
    steps:
    - template: templates/terraform-common.yml
      parameters:
        workingDir: '$(System.DefaultWorkingDirectory)/Parent_Module'
        serviceConnection: 'ModuleSC'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Parent_Module'
        environmentServiceNameAzureRM: 'ModuleSC'
- stage: Manual
  displayName: ManualApproval
  dependsOn: terraformrunning
  jobs:
  - job: WaitForApproval
    displayName: ManualValidation
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'kumar.ankit821@gmail.com'
        instructions: 'Check the plan'
        onTimeout: 'reject'
- stage: finalapply
  displayName: Applychalega
  dependsOn: Manual
  jobs:
  - job: 
    displayName: Apply
    pool: ModuleAgent
    steps:
    - template: templates/terraform-common.yml
      parameters:
        workingDir: '$(System.DefaultWorkingDirectory)/Parent_Module'
        serviceConnection: 'ModuleSC'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Parent_Module'
        environmentServiceNameAzureRM: 'ModuleSC'


